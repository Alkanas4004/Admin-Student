
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الفيديوهات التعليمية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ===== STYLE ===== -->
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
    }

    header button {
      background: #ef4444;
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      overflow: hidden;
      transition: .3s;
    }

    .video-card:hover {
      transform: translateY(-5px);
    }

    iframe {
      width: 100%;
      height: 180px;
      border: none;
    }

    .video-body {
      padding: 15px;
    }

    .video-body h3 {
      margin: 0 0 10px;
      color: #2563eb;
      font-size: 18px;
    }

    .video-body p {
      font-size: 14px;
      color: #555;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      color: #2563eb;
    }
  </style>
</head>

<body>

<header>
  <h2>🎥 الفيديوهات التعليمية</h2>
  <button onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">
  <div id="loading" class="loading">جاري تحميل الفيديوهات...</div>
  <div id="videos" class="videos-grid"></div>
</div>

<!-- ===== FIREBASE ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔐 Firebase Config (بتاعك)
  const firebaseConfig = {
    apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
    authDomain: "date-student.firebaseapp.com",
    projectId: "date-student",
    storageBucket: "date-student.firebasestorage.app",
    messagingSenderId: "952213529741",
    appId: "1:952213529741:web:7a8d8da275214b5754eec4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const videosBox = document.getElementById("videos");
  const loading = document.getElementById("loading");

  // 🚪 تسجيل خروج
  window.logout = () => {
    signOut(auth).then(() => location.href = "login.html");
  };

  // 🔒 حماية الصفحة + تحميل الفيديوهات
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      location.href = "login.html";
      return;
    }

    // ⚠️ موقت: سنة الطالب (بعد كدا هنجيبها من users)
    const studentYear = "أولى";

    const q = query(
      collection(db, "videos"),
      where("year", "==", studentYear)
    );

    const snapshot = await getDocs(q);

    loading.style.display = "none";

    if (snapshot.empty) {
      videosBox.innerHTML = "<p>لا توجد فيديوهات حالياً</p>";
      return;
    }

    snapshot.forEach(doc => {
      const v = doc.data();

      videosBox.innerHTML += `
        <div class="video-card">
          <iframe src="${convertToEmbed(v.url)}" allowfullscreen></iframe>
          <div class="video-body">
            <h3>${v.title}</h3>
            <p>${v.description || ""}</p>
          </div>
        </div>
      `;
    });
  });

  // 🔁 تحويل لينك يوتيوب Embed
  function convertToEmbed(url) {
    if (url.includes("watch?v=")) {
      return url.replace("watch?v=", "embed/");
    }
    return url;
  }
</script>

</body>
</html>
