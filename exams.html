
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الامتحانات</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
  box-sizing:border-box;
  font-family:'Cairo',sans-serif
}
body{
  margin:0;
  background:#f4f6f8;
  color:#333
}
header{
  background:linear-gradient(135deg,#9333ea,#4f46e5);
  color:#fff;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center
}
header h2{margin:0}
header button{
  background:#ef4444;
  border:none;
  color:#fff;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px
}
.exam-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px
}
.exam-card{
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  transition:.3s
}
.exam-card:hover{
  transform:translateY(-5px)
}
.exam-card h3{
  margin:0 0 10px;
  color:#4f46e5
}
.exam-card p{
  font-size:14px;
  color:#555
}
.exam-card button{
  margin-top:10px;
  width:100%;
  background:#4f46e5;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px
}
.loading{
  text-align:center;
  font-size:18px;
  color:#4f46e5
}
</style>
</head>

<body>

<header>
  <h2>📝 الامتحانات المتاحة</h2>
  <button onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">
  <div id="loading" class="loading">جاري تحميل الامتحانات...</div>
  <div id="exams" class="exam-grid"></div>
</div>

<!-- ===== FIREBASE ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,collection,query,where,getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
  authDomain: "date-student.firebaseapp.com",
  projectId: "date-student",
  storageBucket: "date-student.firebasestorage.app",
  messagingSenderId: "952213529741",
  appId: "1:952213529741:web:7a8d8da275214b5754eec4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const box = document.getElementById("exams");
const loading = document.getElementById("loading");

window.logout = ()=>signOut(auth).then(()=>location.href="login.html");

onAuthStateChanged(auth, async user=>{
  if(!user){
    location.href="login.html";
    return;
  }

  // ⚠️ مؤقت: سنة الطالب
  const studentYear = "أولى";

  const q = query(
    collection(db,"exams"),
    where("year","==",studentYear)
  );

  const snap = await getDocs(q);
  loading.style.display="none";

  if(snap.empty){
    box.innerHTML="<p>لا توجد امتحانات حالياً</p>";
    return;
  }

  snap.forEach(doc=>{
    const e = doc.data();
    box.innerHTML += `
      <div class="exam-card">
        <h3>${e.title}</h3>
        <p>السنة الدراسية: ${e.year}</p>
        <button onclick="startExam('${doc.id}')">ابدأ الامتحان</button>
      </div>
    `;
  });
});

window.startExam = (id)=>{
  location.href = "exam.html?examId=" + id;
};
</script>

</body>
</html>
