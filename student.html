
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الطالب</title>
<style>
body{background:#121212;color:#fff;font-family:Cairo;padding:20px}
.card{background:#1a1a1a;padding:15px;border-radius:12px;margin-bottom:10px}
</style>
</head>

<body>
<h2>📚 محاضراتك</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
  projectId: "date-student"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

const q = query(
  collection(db,"lectures"),
  where("yearId","==",user.yearId)
);

const snap = await getDocs(q);
snap.forEach(doc=>{
  list.innerHTML += `<div class="card">${doc.data().name}</div>`;
});
</script>
</body>
</html>
